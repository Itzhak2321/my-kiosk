<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קופה חכמה v3 - חיפוש וכמות</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #1a73e8; --success: #28a745; --danger: #dc3545; --dark: #2c3e50; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f1f3f4; user-select: none; padding-bottom: 30px; }
        .header { background: var(--dark); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .admin-btn { background: #455a64; border: none; color: white; padding: 6px 12px; border-radius: 4px; font-size: 13px; }
        .container { padding: 10px; max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .total-box { font-size: 36px; font-weight: bold; text-align: center; margin: 10px 0; color: var(--success); }
        .cart-table { width: 100%; border-collapse: collapse; }
        .cart-table td { padding: 10px 0; border-bottom: 1px solid #f9f9f9; }
        
        /* סורק וכפתור */
        #saleReader { width: 100%; border-radius: 12px; overflow: hidden; display: none; margin-bottom: 15px; border: 2px solid var(--primary); }
        .scan-toggle-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-open { background: var(--primary); color: white; }
        .btn-close { background: var(--danger); color: white; }

        /* מקלדת משופרת */
        .numpad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: #ddd; padding: 8px; border-radius: 12px; }
        .num-btn { background: white; border: none; padding: 18px 5px; font-size: 20px; font-weight: bold; border-radius: 8px; box-shadow: 0 2px 0 #bbb; }
        .num-btn:active { background: #eee; transform: translateY(2px); box-shadow: none; }
        .num-btn.add { background: var(--success); color: white; grid-column: span 2; }
        .num-btn.clr { background: var(--danger); color: white; }
        .num-btn.mul { background: #ff9800; color: white; } /* כפתור כפול */

        /* חיפוש ומוצרים */
        .search-input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; margin-bottom: 10px; font-size: 16px; box-sizing: border-box; }
        .quick-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; }
        .prod-btn { background: white; border: 1px solid #ced4da; padding: 12px 5px; border-radius: 12px; text-align: center; }
        
        .hidden { display: none; }
        .admin-panel { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold;">קופה חכמה v3 📱</div>
    <button class="admin-btn" onclick="toggleAdmin()">⚙️ ניהול</button>
</div>

<div class="container">

    <div class="card" style="border-top: 4px solid var(--success);">
        <table class="cart-table" id="cartTable"><tbody></tbody></table>
        <div class="total-box" id="totalDisplay">0.00 ₪</div>
        <button onclick="clearCart()" style="width:100%; background:none; border:none; color:var(--danger); font-weight:bold;">🗑️ נקה הכל</button>
    </div>

    <div id="saleReader"></div>
    <button id="mainScanBtn" class="scan-toggle-btn btn-open" onclick="handleScanButton()">
        <span id="btnIcon">📷</span> <span id="btnText">סרוק מוצר</span>
    </button>

    <div class="card" style="background:#e9ecef;">
        <input type="text" id="manualPrice" readonly placeholder="0.00" style="text-align:center; font-size:26px; border:none; background:transparent; width:100%; margin-bottom:10px; font-weight:bold;">
        <div class="numpad-grid">
            <button class="num-btn" onclick="addNum('7')">7</button>
            <button class="num-btn" onclick="addNum('8')">8</button>
            <button class="num-btn" onclick="addNum('9')">9</button>
            <button class="num-btn clr" onclick="clearNum()">C</button>
            
            <button class="num-btn" onclick="addNum('4')">4</button>
            <button class="num-btn" onclick="addNum('5')">5</button>
            <button class="num-btn" onclick="addNum('6')">6</button>
            <button class="num-btn mul" onclick="addNum(' X ')">X</button>
            
            <button class="num-btn" onclick="addNum('1')">1</button>
            <button class="num-btn" onclick="addNum('2')">2</button>
            <button class="num-btn" onclick="addNum('3')">3</button>
            <button class="num-btn" onclick="addNum('.')">.</button>
            
            <button class="num-btn" onclick="addNum('0')">0</button>
            <button class="num-btn add" onclick="addManualPrice()">➕ הוסף</button>
        </div>
    </div>

    <div style="margin: 15px 0;">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 חפש מוצר במלאי..." oninput="filterProducts()">
        <div class="quick-grid" id="quickProducts"></div>
    </div>

    <div id="adminSection" class="admin-panel hidden">
        <h3>הוספת מוצר</h3>
        <input type="text" id="regBarcode" placeholder="ברקוד">
        <input type="text" id="regName" placeholder="שם">
        <input type="number" id="regPrice" placeholder="מחיר">
        <button onclick="saveToCloud()" style="width:100%; padding:15px; background:var(--dark); color:white; border:none; border-radius:8px;">שמור</button>
        <div id="adminInventory" style="margin-top:10px; font-size:13px;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCOWSN0aVOpvsguY0CFDR477mKVMj17o98",
        authDomain: "mykiosk-55b08.firebaseapp.com",
        databaseURL: "https://mykiosk-55b08-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mykiosk-55b08",
        storageBucket: "mykiosk-55b08.firebasestorage.app",
        messagingSenderId: "661234559610",
        appId: "1:661234559610:web:577f30ee28cd0eecc4e9c3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');

    let html5QrCode, isPaused = false, isScannerOpen = false, cart = [], inventoryData = {};

    function toggleAdmin() { document.getElementById('adminSection').classList.toggle('hidden'); }

    // סורק
    function handleScanButton() {
        if (isScannerOpen) stopScanner();
        else startScanner();
    }
    function startScanner() {
        isScannerOpen = true;
        document.getElementById('mainScanBtn').className = "scan-toggle-btn btn-close";
        document.getElementById('btnText').innerText = "סגור מצלמה";
        document.getElementById('saleReader').style.display = 'block';
        html5QrCode = new Html5Qrcode("saleReader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
            if (isPaused) return;
            isPaused = true; beep.play();
            processSale(text);
            setTimeout(() => isPaused = false, 2000);
        });
    }
    function stopScanner() {
        if (html5QrCode) html5QrCode.stop().then(() => {
            isScannerOpen = false;
            document.getElementById('mainScanBtn').className = "scan-toggle-btn btn-open";
            document.getElementById('btnText').innerText = "סרוק מוצר";
            document.getElementById('saleReader').style.display = 'none';
        });
    }

    // מקלדת וכפל
    function addNum(n) { document.getElementById('manualPrice').value += n; }
    function clearNum() { document.getElementById('manualPrice').value = ''; }
    function addManualPrice() {
        const val = document.getElementById('manualPrice').value;
        if (!val) return;
        if (val.includes(' X ')) {
            const parts = val.split(' X ');
            const qty = parseFloat(parts[0]);
            const price = parseFloat(parts[1]);
            if (qty && price) addToCart(`כמות: ${qty}`, qty * price);
        } else {
            addToCart("כללי", parseFloat(val));
        }
        clearNum();
    }

    // ניהול סל
    function processSale(barcode) {
        db.ref('inventory/' + barcode).once('value').then(snap => {
            const p = snap.val();
            if (p) addToCart(p.name, p.price);
            else alert("לא במלאי: " + barcode);
        });
    }
    function addToCart(name, price) {
        cart.push({ name, price });
        updateCartUI();
        beep.play();
    }
    function updateCartUI() {
        const tbody = document.querySelector('#cartTable tbody');
        tbody.innerHTML = ''; let total = 0;
        cart.forEach((item, index) => {
            tbody.innerHTML += `<tr><td><b>${item.name}</b></td><td style="text-align:left">${item.price.toFixed(2)} ₪</td><td onclick="cart.splice(${index},1);updateCartUI()" style="color:red;width:30px;text-align:center">✕</td></tr>`;
            total += item.price;
        });
        document.getElementById('totalDisplay').innerText = total.toFixed(2) + " ₪";
    }
    function clearCart() { if(confirm("נקה סל?")) { cart = []; updateCartUI(); } }

    // חיפוש ומלאי
    function filterProducts() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const quick = document.getElementById('quickProducts');
        quick.innerHTML = '';
        for (let id in inventoryData) {
            const p = inventoryData[id];
            if (p.name.toLowerCase().includes(term)) {
                quick.innerHTML += `<div class="prod-btn" onclick="addToCart('${p.name}', ${p.price})"><b>${p.name}</b><span>${p.price} ₪</span></div>`;
            }
        }
    }

    db.ref('inventory').on('value', snap => {
        inventoryData = snap.val() || {};
        filterProducts();
        const admin = document.getElementById('adminInventory');
        admin.innerHTML = '';
        for (let id in inventoryData) {
            admin.innerHTML += `• ${inventoryData[id].name} <span onclick="if(confirm('מחק?'))db.ref('inventory/${id}').remove()" style="color:red">[X]</span><br>`;
        }
    });

    function saveToCloud() {
        const b = document.getElementById('regBarcode').value, n = document.getElementById('regName').value, p = document.getElementById('regPrice').value;
        if (b && n && p) db.ref('inventory/' + b).set({ name: n, price: parseFloat(p) }).then(() => alert("נשמר"));
    }
</script>
</body>
</html>
