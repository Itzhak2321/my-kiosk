
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <title>מערכת קופה לקיוסק - מחובר לענן</title>
   
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; color: #007bff; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-save { background: #28a745; color: white; }
        .btn-save:hover { background: #218838; }
        .btn-clear { background: #dc3545; color: white; margin-top: 10px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: right; }
        th { background-color: #f8f9fa; }
        .total-section { font-size: 24px; font-weight: bold; margin-top: 20px; text-align: center; color: #28a745; }
        .barcode-scan-area { background: #e7f3ff; border: 2px dashed #007bff; }
    </style>
</head>
<body>

<h1 style="text-align:center;">ניהול קופה חכמה</h1>

<div class="grid-container">
   
    <div class="card">
        <button onclick="startScanner('regBarcode')" style="background:#1a73e8; color:white; margin-top:5px;">📷 סרוק עם המצלמה</button>
<div id="reader" style="width: 100%; margin-top:10px; display:none;"></div>

        <h2>1. הוספת מוצר למלאי</h2>
        <input type="text" id="regBarcode" placeholder="סרוק ברקוד להוספה...">
        <input type="text" id="regName" placeholder="שם המוצר">
        <input type="number" id="regPrice" placeholder="מחיר בש''ח">
        <button class="btn-save" onclick="saveToCloud()">שמור מוצר בענן</button>
       
        <h3>מוצרים קיימים במלאי:</h3>
        <table id="inventoryTable">
            <thead>
                <tr><th>ברקוד</th><th>שם</th><th>מחיר</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
    <h2>2. ביצוע מכירה</h2>

    <button onclick="startScanner('saleScan')" style="background:#28a745; color:white; margin-top:5px; width: 100%; padding: 10px; border-radius: 5px; cursor: pointer;">📷 סרוק מוצר למכירה</button>
    <input type="text" id="saleScan" placeholder="סרוק מוצר למכירה..." onkeypress="handleSaleScan(event)" autofocus>
    
    <table id="cartTable">
        <thead>
            <tr>
                <th>מוצר</th>
                <th>מחיר</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    </div>


<script>

let html5QrCode;

function startScanner(targetInputId) {
    const readerElement = document.getElementById('reader');
    readerElement.style.display = 'block'; // הצגת אזור המצלמה

    html5QrCode = new Html5Qrcode("reader");
    
    const config = { fps: 10, qrbox: { width: 250, height: 150 } };

    // התחלת הסריקה (משתמש במצלמה אחורית בטלפון)
    html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
        // מה קורה כשמזוהה ברקוד:
        document.getElementById(targetInputId).value = decodedText;
        
        // עצירת המצלמה אחרי סריקה מוצלחת
        stopScanner();
        
        // אם זה בשדה המכירה, נפעיל את תהליך המכירה אוטומטית
        if (targetInputId === 'saleScan') {
            processSale(decodedText); 
        }
    }).catch((err) => {
        console.error("שגיאה בפתיחת מצלמה:", err);
        alert("לא ניתן לגשת למצלמה. וודא שנתת אישור דפדפן.");
    });
}

function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            document.getElementById('reader').style.display = 'none';
        });
    }
}

    
    // *** חובה: החלף את הפרטים כאן בפרטים מה-Firebase שלך ***
    const firebaseConfig = {
  apiKey: "AIzaSyCOWSN0aVOpvsguY0CFDR477mKVMj17o98",
  authDomain: "mykiosk-55b08.firebaseapp.com",
  databaseURL: "https://mykiosk-55b08-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "mykiosk-55b08",
  storageBucket: "mykiosk-55b08.firebasestorage.app",
  messagingSenderId: "661234559610",
  appId: "1:661234559610:web:577f30ee28cd0eecc4e9c3",
  measurementId: "G-N3M0WR2N8B"
};

    // אתחול Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- לוגיקה של המלאי ---
    function saveToCloud() {
        const barcode = document.getElementById('regBarcode').value;
        const name = document.getElementById('regName').value;
        const price = document.getElementById('regPrice').value;

        if (barcode && name && price) {
            db.ref('inventory/' + barcode).set({
                name: name,
                price: parseFloat(price)
            }).then(() => {
                document.getElementById('regBarcode').value = '';
                document.getElementById('regName').value = '';
                document.getElementById('regPrice').value = '';
                alert("המוצר נשמר בהצלחה!");
            });
        }
    }

    // עדכון טבלת המלאי מהענן בזמן אמת
    db.ref('inventory').on('value', (snapshot) => {
        const data = snapshot.val();
        const tbody = document.querySelector('#inventoryTable tbody');
        tbody.innerHTML = '';
        for (let id in data) {
            const p = data[id];
            tbody.innerHTML += `<tr><td>${id}</td><td>${p.name}</td><td>${p.price} ₪</td></tr>`;
        }
    });

    // --- לוגיקה של המכירה ---
    let cart = [];

    function handleSaleScan(event) {
        if (event.key === "Enter") {
            const barcode = event.target.value;
            db.ref('inventory/' + barcode).once('value').then((snapshot) => {
                const product = snapshot.val();
                if (product) {
                    cart.push(product);
                    updateCartUI();
                } else {
                    alert("מוצר לא קיים במלאי!");
                }
                event.target.value = '';
            });
        }
    }

    function updateCartUI() {
        const tbody = document.querySelector('#cartTable tbody');
        tbody.innerHTML = '';
        let total = 0;
        cart.forEach(item => {
            tbody.innerHTML += `<tr><td>${item.name}</td><td>${item.price} ₪</td></tr>`;
            total += item.price;
        });
        document.getElementById('totalDisplay').innerText = `סה"כ: ${total.toFixed(2)} ₪`;
    }

    function clearCart() {
        cart = [];
        updateCartUI();
        document.getElementById('saleBarcode').focus();
    }
</script>

</body>
</html>
