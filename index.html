<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קופה חכמה Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #1a73e8; --success: #28a745; --danger: #dc3545; --dark: #2c3e50; --warning: #f39c12; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f1f3f4; padding-bottom: 30px; user-select: none; }
        .header { background: var(--dark); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { padding: 10px; max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* עיצוב חלון צף (Modal) */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; text-align: center; }

        .total-box { font-size: 40px; font-weight: bold; text-align: center; color: var(--success); margin: 10px 0; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        
        .numpad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: #ddd; padding: 10px; border-radius: 15px; }
        .num-btn { background: white; border: none; padding: 15px; font-size: 20px; font-weight: bold; border-radius: 8px; }

        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f9f9f9; margin-bottom: 5px; border-radius: 8px; cursor: pointer; }
        .status-msg { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 3000; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 18px; font-weight: bold;">My Kiosk 📱</div>
    <button onclick="toggleAdmin()" style="background:#455a64; color:white; border:none; padding:8px 15px; border-radius:5px;">⚙️ ניהול</button>
</div>

<div class="container">
    <div id="statusMsg" class="status-msg hidden"></div>

    <div id="adminSection" class="admin-panel card hidden">
        <h3 style="margin:0 0 10px 0">👤 לקוחות</h3>
        <input type="text" id="custName" placeholder="שם הלקוח">
        <input type="text" id="custPhone" placeholder="מספר טלפון">
        <button onclick="addCustomer()" class="btn" style="background:var(--primary); color:white;">+ הוסף לקוח</button>
        <div id="customerList" style="margin-top:10px; max-height:200px; overflow-y:auto;"></div>
        
        <hr style="margin:20px 0;">
        
        <h3 style="margin:0 0 10px 0">📦 מלאי מוצרים</h3>
        <input type="text" id="regBarcode" placeholder="סרוק ברקוד...">
        <input type="text" id="regName" placeholder="שם מוצר">
        <input type="number" id="regPrice" placeholder="מחיר">
        <button onclick="saveProduct()" class="btn" style="background:var(--dark); color:white;">💾 שמור מוצר</button>
        <div id="inventoryList" style="margin-top:10px; max-height:200px; overflow-y:auto;"></div>
    </div>

    <div class="card">
        <select id="activeCustomer" onchange="updateCustomerInfo()" style="width:100%; padding:12px; border-radius:10px; border:2px solid var(--primary); font-size:16px;">
            <option value="walkin">לקוח מזדמן (מזומן)</option>
        </select>
    </div>

    <div class="card">
        <div id="cartContent" style="max-height: 150px; overflow-y: auto;">
            <table style="width:100%;" id="cartTable"><tbody></tbody></table>
        </div>
        <div class="total-box" id="totalDisplay">0.00 ₪</div>
        <div style="display:flex; gap:10px;">
            <button onclick="clearCart()" class="btn" style="background:#ddd; flex:1;">🗑️ נקה</button>
            <button onclick="chargeCustomer()" class="btn" style="background:var(--warning); flex:2;">חייב כרטיסייה 💳</button>
        </div>
    </div>

    <div class="card" style="background:#eee;">
        <input type="text" id="manualPrice" readonly placeholder="0.00" style="text-align:center; font-size:24px; border:none; background:transparent; width:100%; font-weight:bold;">
        <div class="numpad-grid">
            <button class="num-btn" onclick="addNum('7')">7</button>
            <button class="num-btn" onclick="addNum('8')">8</button>
            <button class="num-btn" onclick="addNum('9')">9</button>
            <button class="num-btn" onclick="clearNum()" style="color:var(--danger)">C</button>
            <button class="num-btn" onclick="addNum('4')">4</button>
            <button class="num-btn" onclick="addNum('5')">5</button>
            <button class="num-btn" onclick="addNum('6')">6</button>
            <button class="num-btn" onclick="addNum(' X ')" style="background:orange">X</button>
            <button class="num-btn" onclick="addNum('1')">1</button>
            <button class="num-btn" onclick="addNum('2')">2</button>
            <button class="num-btn" onclick="addNum('3')">3</button>
            <button class="num-btn" onclick="addManualPrice()" style="grid-row: span 2; background:var(--success); color:white;">+</button>
            <button class="num-btn" onclick="addNum('0')" style="grid-column: span 2;">0</button>
            <button class="num-btn" onclick="addNum('.')">.</button>
        </div>
    </div>
</div>

<div id="customerModal" class="modal">
    <div class="modal-content">
        <h2 id="mCustName">שם לקוח</h2>
        <p id="mCustPhone" style="color:#666;"></p>
        <div style="font-size:30px; font-weight:bold; color:var(--danger); margin:15px 0;" id="mCustBalance">0.00 ₪</div>
        <hr>
        <p>זיכוי / תשלום חוב:</p>
        <input type="number" id="payAmount" placeholder="כמה הלקוח שילם?">
        <button onclick="payDebt()" class="btn" style="background:var(--success); color:white;">בצע זיכוי ✅</button>
        <button onclick="closeModal()" class="btn" style="background:#ccc;">סגור</button>
        <button onclick="deleteCustomerActual()" class="btn" style="background:none; color:red; font-size:12px;">מחק לקוח לצמיתות</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCOWSN0aVOpvsguY0CFDR477mKVMj17o98",
        authDomain: "mykiosk-55b08.firebaseapp.com",
        databaseURL: "https://mykiosk-55b08-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mykiosk-55b08",
        storageBucket: "mykiosk-55b08.firebasestorage.app",
        messagingSenderId: "661234559610",
        appId: "1:661234559610:web:577f30ee28cd0eecc4e9c3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');

    let cart = [], customers = {}, inventory = {}, selectedCustId = null;

    function toggleAdmin() { document.getElementById('adminSection').classList.toggle('hidden'); }
    function showStatus(t, type='success') {
        const s = document.getElementById('statusMsg'); s.innerText = t;
        s.style.background = type === 'success' ? '#d4edda' : '#f8d7da';
        s.classList.remove('hidden'); setTimeout(() => s.classList.add('hidden'), 2500);
    }

    // קישור לאפליקציה
    function updateBarcode(barcode) {
        if (!document.getElementById('adminSection').classList.contains('hidden')) {
            document.getElementById('regBarcode').value = barcode; beep.play();
        } else {
            db.ref('inventory/' + barcode).once('value', snap => {
                const p = snap.val(); if(p) addToCart(p.name, p.price); else showStatus("לא רשום", "error");
            });
        }
    }

    function addToCart(name, price) { cart.push({name, price}); updateUI(); beep.play(); }
    function updateUI() {
        const tbody = document.querySelector('#cartTable tbody'); tbody.innerHTML = ''; let total = 0;
        cart.forEach((item, i) => {
            tbody.innerHTML += `<tr><td>${item.name}</td><td style="text-align:left">${item.price.toFixed(2)} ₪</td><td onclick="cart.splice(${i},1);updateUI()" style="color:red; width:30px; text-align:center;">✕</td></tr>`;
            total += item.price;
        });
        document.getElementById('totalDisplay').innerText = total.toFixed(2) + " ₪";
    }

    // ניהול לקוחות
    function addCustomer() {
        const n = document.getElementById('custName').value, p = document.getElementById('custPhone').value;
        if(n && p) db.ref('customers/' + p).set({name: n, balance: 0}).then(() => {
            document.getElementById('custName').value = ''; document.getElementById('custPhone').value = '';
        });
    }

    db.ref('customers').on('value', snap => {
        customers = snap.val() || {};
        const select = document.getElementById('activeCustomer');
        const list = document.getElementById('customerList');
        select.innerHTML = '<option value="walkin">לקוח מזדמן (מזומן)</option>';
        list.innerHTML = '';
        for (let id in customers) {
            select.innerHTML += `<option value="${id}">${customers[id].name}</option>`;
            list.innerHTML += `<div class="list-item" onclick="openCustomerModal('${id}')">
                <span><b>${customers[id].name}</b></span>
                <span style="color:red">${customers[id].balance.toFixed(2)} ₪</span>
            </div>`;
        }
    });

    // חלון צף
    function openCustomerModal(id) {
        selectedCustId = id;
        document.getElementById('mCustName').innerText = customers[id].name;
        document.getElementById('mCustPhone').innerText = "טלפון: " + id;
        document.getElementById('mCustBalance').innerText = customers[id].balance.toFixed(2) + " ₪";
        document.getElementById('customerModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('customerModal').style.display = 'none'; }
    function payDebt() {
        const amount = parseFloat(document.getElementById('payAmount').value);
        if(!amount || !selectedCustId) return;
        const newBalance = customers[selectedCustId].balance - amount;
        db.ref('customers/' + selectedCustId + '/balance').set(newBalance).then(() => {
            document.getElementById('payAmount').value = '';
            closeModal();
            showStatus("החשבון עודכן!");
        });
    }
    function deleteCustomerActual() {
        if(confirm("למחוק לקוח?")) { db.ref('customers/' + selectedCustId).remove(); closeModal(); }
    }

    // ניהול מלאי
    function saveProduct() {
        const b = document.getElementById('regBarcode').value, n = document.getElementById('regName').value, p = document.getElementById('regPrice').value;
        if(b && n && p) db.ref('inventory/' + b).set({name: n, price: parseFloat(p)}).then(() => {
            document.getElementById('regBarcode').value = ''; document.getElementById('regName').value = ''; document.getElementById('regPrice').value = '';
            showStatus("מוצר נשמר");
        });
    }
    db.ref('inventory').on('value', snap => {
        inventory = snap.val() || {};
        const list = document.getElementById('inventoryList');
        list.innerHTML = '';
        for (let b in inventory) {
            list.innerHTML += `<div class="list-item">
                <span>${inventory[b].name} (${inventory[b].price}₪)</span>
                <button onclick="db.ref('inventory/${b}').remove()" style="color:red; border:none; background:none;">מחק</button>
            </div>`;
        }
    });

    function chargeCustomer() {
        const id = document.getElementById('activeCustomer').value;
        const total = parseFloat(document.getElementById('totalDisplay').innerText);
        if(id === 'walkin' || total === 0) return showStatus("בחר לקוח", "error");
        db.ref('customers/' + id + '/balance').set(customers[id].balance + total).then(() => {
            cart = []; updateUI(); showStatus("חויב בהצלחה!");
        });
    }

    // פונקציות מקלדת
    function addNum(n) { document.getElementById('manualPrice').value += n; }
    function clearNum() { document.getElementById('manualPrice').value = ''; }
    function addManualPrice() {
        const v = document.getElementById('manualPrice').value;
        if(!v) return;
        if(v.includes(' X ')) {
            const p = v.split(' X '); addToCart("כללי", parseFloat(p[0]) * parseFloat(p[1]));
        } else { addToCart("כללי", parseFloat(v)); }
        clearNum();
    }
    function clearCart() { cart = []; updateUI(); }
</script>
</body>
</html>
