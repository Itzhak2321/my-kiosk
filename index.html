<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פינה בכיכר - מצב לילה</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #1a73e8; --success: #28a745; --danger: #dc3545; --warning: #f39c12;
            --bg: #f1f3f4; --card-bg: #ffffff; --text: #2c3e50; --header-bg: #2c3e50; --input-border: #ccc;
        }

        /* הגדרות מצב לילה */
        body.dark-mode {
            --bg: #121212; --card-bg: #1e1e1e; --text: #e0e0e0; --header-bg: #000000; --input-border: #444;
        }

        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 30px; user-select: none; transition: 0.3s; }
        .header { background: var(--header-bg); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { padding: 10px; max-width: 500px; margin: auto; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); color: var(--text); width: 92%; max-width: 400px; padding: 20px; border-radius: 20px; text-align: center; box-sizing: border-box; }
        .modal-body { max-height: 350px; overflow-y: auto; margin-top: 15px; }

        .total-box { font-size: 40px; font-weight: bold; text-align: center; color: var(--success); margin: 10px 0; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; color: white; }
        .btn-header { background:#455a64; color:white; border:none; padding:8px 12px; border-radius:5px; margin-right: 5px; cursor: pointer; font-weight: bold; font-size: 14px; }
        
        .numpad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: #ddd; padding: 10px; border-radius: 15px; }
        body.dark-mode .numpad-grid { background: #333; }
        .num-btn { background: var(--card-bg); color: var(--text); border: none; padding: 15px; font-size: 20px; font-weight: bold; border-radius: 8px; }

        .hidden { display: none; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid var(--input-border); border-radius: 8px; box-sizing: border-box; font-size: 16px; background: var(--card-bg); color: var(--text); }
        
        .prod-btn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 10px 0; }
        .prod-btn-quick { background: var(--card-bg); border: 1px solid var(--input-border); padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(128,128,128,0.1); margin-bottom: 5px; border-radius: 8px; cursor: pointer; }
        .status-msg { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 3000; padding: 10px 20px; border-radius: 20px; font-weight: bold; background: var(--card-bg); color: var(--text); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .history-list { margin-top: 15px; text-align: right; font-size: 13px; max-height: 150px; overflow-y: auto; border-top: 1px solid var(--input-border); padding-top: 10px; }
        .hist-item { padding: 5px 0; border-bottom: 1px solid rgba(128,128,128,0.1); display: flex; justify-content: space-between; }
        .hist-date { color: #888; font-size: 11px; }
        
        #themeToggle { background: none; border: none; color: white; font-size: 20px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body class="">

<div class="header">
    <div style="display: flex; align-items: center;">
        <button id="themeToggle" onclick="toggleTheme()">🌙</button>
        <div style="font-size: 18px; font-weight: bold;">פינה בכיכר 🌳</div>
    </div>
    <div style="display: flex;">
        <button onclick="openProductsModal()" class="btn-header">🛍️ מוצרים</button>
        <button onclick="toggleAdmin()" class="btn-header">⚙️ ניהול</button>
    </div>
</div>

<div class="container">
    <div id="statusMsg" class="status-msg hidden"></div>

    <div id="adminSection" class="admin-panel card hidden">
        <h3 style="margin:0 0 10px 0; color:var(--primary);">👤 ניהול לקוחות</h3>
        <input type="text" id="custName" placeholder="שם הלקוח">
        <input type="text" id="custPhone" placeholder="מספר טלפון">
        <button onclick="addCustomer()" class="btn" style="background:var(--primary);">+ הוסף לקוח</button>
        <div id="customerList" style="margin-top:10px; max-height:150px; overflow-y:auto; border:1px solid var(--input-border); padding:5px; border-radius: 8px;"></div>
        <hr style="margin:20px 0; border:0; border-top:1px solid var(--input-border);">
        <h3 style="margin:0 0 10px 0;">📦 ניהול מלאי מוצרים</h3>
        <input type="text" id="regBarcode" placeholder="סרוק ברקוד...">
        <input type="text" id="regName" placeholder="שם מוצר">
        <input type="number" id="regPrice" placeholder="מחיר">
        <button onclick="saveProduct()" class="btn" style="background:var(--text); color: var(--card-bg);">💾 שמור מוצר</button>
        <div id="inventoryList" style="margin-top:10px; max-height:150px; overflow-y:auto; border:1px solid var(--input-border); padding:5px; border-radius: 8px;"></div>
    </div>

    <div class="card" style="border-right: 5px solid var(--primary); padding: 10px;">
        <select id="activeCustomer">
            <option value="walkin">לקוח מזדמן (מזומן)</option>
        </select>
    </div>

    <div class="card">
        <div id="cartContent" style="max-height: 180px; overflow-y: auto;">
            <table style="width:100%; border-collapse: collapse;" id="cartTable"><tbody></tbody></table>
        </div>
        <div class="total-box" id="totalDisplay">0.00 ₪</div>
        <div style="display:flex; gap:10px;">
            <button onclick="clearCart()" class="btn" style="background:#888; flex:1;">🗑️ נקה</button>
            <button id="chargeBtn" onclick="chargeCustomer()" class="btn" style="background:var(--warning); flex:2;">חייב כרטיסייה 💳</button>
        </div>
    </div>

    <div class="card" style="background:rgba(128,128,128,0.1); border:none;">
        <input type="text" id="manualPrice" readonly placeholder="0.00" style="text-align:center; font-size:28px; border:none; background:transparent; width:100%; margin-bottom:10px; font-weight:bold;">
        <div class="numpad-grid">
            <button class="num-btn" onclick="addNum('7')">7</button>
            <button class="num-btn" onclick="addNum('8')">8</button>
            <button class="num-btn" onclick="addNum('9')">9</button>
            <button class="num-btn" onclick="clearNum()" style="background:var(--danger); color:white">C</button>
            <button class="num-btn" onclick="addNum('4')">4</button>
            <button class="num-btn" onclick="addNum('5')">5</button>
            <button class="num-btn" onclick="addNum('6')">6</button>
            <button class="num-btn" onclick="addNum(' X ')" style="background:var(--warning); color:white">X</button>
            <button class="num-btn" onclick="addNum('1')">1</button>
            <button class="num-btn" onclick="addNum('2')">2</button>
            <button class="num-btn" onclick="addNum('3')">3</button>
            <button class="num-btn" onclick="addManualPrice()" style="grid-row: span 2; background:var(--success); color:white;">➕</button>
            <button class="num-btn" onclick="addNum('0')" style="grid-column: span 2;">0</button>
            <button class="num-btn" onclick="addNum('.')">.</button>
        </div>
    </div>
</div>

<div id="customerModal" class="modal">
    <div class="modal-content">
        <h2 id="mCustName" style="margin-bottom:0;">שם לקוח</h2>
        <p id="mCustPhone" style="color:#888; margin:5px 0;"></p>
        <div style="font-size:32px; font-weight:bold; color:var(--danger); margin:10px 0;" id="mCustBalance">0.00 ₪</div>
        <input type="number" id="payAmount" placeholder="סכום תשלום מזומן...">
        <button onclick="payDebt()" class="btn" style="background:var(--success);">בצע זיכוי ✅</button>
        <div class="history-list" id="mHistory">
            <b>היסטוריה אחרונה:</b>
            <div id="historyContent">טוען...</div>
        </div>
        <button onclick="closeCustomerModal()" class="btn" style="background:#888; padding: 10px; margin-top: 15px;">סגור</button>
        <button id="delBtnStep1" onclick="showDeleteConfirm()" style="background:none; border:none; color:red; text-decoration:underline; font-size:12px; margin-top:10px; cursor:pointer;">מחק לקוח לצמיתות</button>
        <button id="delBtnActual" onclick="deleteCustomerActual()" class="btn" style="background:red; color:white; display:none;">בטוח? לחץ למחיקה סופית</button>
    </div>
</div>

<div id="productsModal" class="modal">
    <div class="modal-content" style="max-width: 450px;">
        <h2 style="margin: 0 0 10px 0;">🛍️ בחירת מוצר</h2>
        <input type="text" id="quickSearchInput" placeholder="🔍 חפש מוצר..." oninput="filterQuickProducts()">
        <div id="productsBody" class="modal-body prod-btn-grid"></div>
        <button onclick="closeProductsModal()" class="btn" style="background:#888; padding: 10px; margin-top: 15px;">סגור</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCOWSN0aVOpvsguY0CFDR477mKVMj17o98",
        authDomain: "mykiosk-55b08.firebaseapp.com",
        databaseURL: "https://mykiosk-55b08-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mykiosk-55b08",
        storageBucket: "mykiosk-55b08.firebasestorage.app",
        messagingSenderId: "661234559610",
        appId: "1:661234559610:web:577f30ee28cd0eecc4e9c3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');

    let cart = [], customers = {}, inventory = {}, selectedCustId = null;

    // ניהול מצב לילה
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('themeToggle').innerText = isDark ? '☀️' : '🌙';
    }
    // טעינת מצב לילה שמור
    if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('themeToggle').innerText = '☀️';
    }

    function toggleAdmin() { document.getElementById('adminSection').classList.toggle('hidden'); }
    function showStatus(t) {
        const s = document.getElementById('statusMsg'); s.innerText = t;
        s.classList.remove('hidden'); setTimeout(() => s.classList.add('hidden'), 2500);
    }

    function updateBarcode(barcode) {
        if (!document.getElementById('adminSection').classList.contains('hidden')) {
            document.getElementById('regBarcode').value = barcode; beep.play();
        } else {
            db.ref('inventory/' + barcode).once('value', snap => {
                const p = snap.val(); if(p) addToCart(p.name, p.price); else showStatus("לא רשום");
            });
        }
    }

    function addToCart(name, price) { cart.push({name, price}); updateUI(); beep.play(); }
    function updateUI() {
        const tbody = document.querySelector('#cartTable tbody'); tbody.innerHTML = ''; let total = 0;
        cart.forEach((item, i) => {
            tbody.innerHTML += `<tr><td style="padding:10px 0;">${item.name}</td><td style="text-align:left; font-weight:bold;">${item.price.toFixed(2)} ₪</td><td onclick="cart.splice(${i},1);updateUI()" style="color:red; width:30px; text-align:center;">✕</td></tr>`;
            total += item.price;
        });
        document.getElementById('totalDisplay').innerText = total.toFixed(2) + " ₪";
    }

    function addCustomer() {
        const n = document.getElementById('custName').value, p = document.getElementById('custPhone').value;
        if(n && p) db.ref('customers/' + p).set({name: n, balance: 0});
    }

    db.ref('customers').on('value', snap => {
        customers = snap.val() || {};
        const select = document.getElementById('activeCustomer');
        const list = document.getElementById('customerList');
        select.innerHTML = '<option value="walkin">לקוח מזדמן (מזומן)</option>';
        list.innerHTML = '';
        for (let id in customers) {
            select.innerHTML += `<option value="${id}">${customers[id].name}</option>`;
            list.innerHTML += `<div class="list-item" onclick="openCustomerModal('${id}')"><span><b>${customers[id].name}</b></span><span style="color:red; font-weight:bold;">${customers[id].balance.toFixed(2)} ₪</span></div>`;
        }
    });

    function openCustomerModal(id) {
        selectedCustId = id;
        document.getElementById('mCustName').innerText = customers[id].name;
        document.getElementById('mCustPhone').innerText = "טלפון: " + id;
        document.getElementById('mCustBalance').innerText = customers[id].balance.toFixed(2) + " ₪";
        document.getElementById('delBtnStep1').style.display = 'inline-block';
        document.getElementById('delBtnActual').style.display = 'none';
        const histDiv = document.getElementById('historyContent');
        histDiv.innerHTML = 'טוען...';
        db.ref('history/' + id).limitToLast(10).once('value', snap => {
            const data = snap.val();
            if(!data) { histDiv.innerHTML = 'אין פעולות'; return; }
            histDiv.innerHTML = '';
            Object.values(data).reverse().forEach(h => {
                histDiv.innerHTML += `<div class="hist-item"><span>${h.desc}</span><span style="font-weight:bold; color:${h.amount > 0 ? 'red':'var(--success)'}">${h.amount > 0 ? '+' : ''}${h.amount.toFixed(2)}₪</span><span class="hist-date">${h.date}</span></div>`;
            });
        });
        document.getElementById('customerModal').style.display = 'flex';
    }

    function closeCustomerModal() { document.getElementById('customerModal').style.display = 'none'; }
    
    function logHistory(custId, amount, desc) {
        const now = new Date();
        const dateStr = now.toLocaleDateString('he-IL') + " " + now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();
        db.ref('history/' + custId).push({ amount, desc, date: dateStr });
    }

    function payDebt() {
        const amount = parseFloat(document.getElementById('payAmount').value);
        if(!amount || !selectedCustId) return;
        db.ref('customers/' + selectedCustId + '/balance').set(customers[selectedCustId].balance - amount).then(() => {
            logHistory(selectedCustId, -amount, "תשלום מזומן");
            document.getElementById('payAmount').value = ''; closeCustomerModal(); showStatus("עודכן!");
        });
    }

    function chargeCustomer() {
        const id = document.getElementById('activeCustomer').value;
        const total = parseFloat(document.getElementById('totalDisplay').innerText);
        if(id === 'walkin' || total === 0) return;
        const desc = cart.map(i => i.name).join(', ').substring(0, 30);
        db.ref('customers/' + id + '/balance').set((customers[id].balance || 0) + total).then(() => {
            logHistory(id, total, desc || "קנייה");
            cart = []; updateUI(); showStatus("חויב!");
        });
    }

    function showDeleteConfirm() { document.getElementById('delBtnStep1').style.display='none'; document.getElementById('delBtnActual').style.display='block'; }
    function deleteCustomerActual() { db.ref('customers/'+selectedCustId).remove(); db.ref('history/'+selectedCustId).remove(); closeCustomerModal(); }

    function openProductsModal() { document.getElementById('productsModal').style.display = 'flex'; renderQuickProducts(inventory); }
    function closeProductsModal() { document.getElementById('productsModal').style.display = 'none'; }
    function renderQuickProducts(data) {
        const body = document.getElementById('productsBody'); body.innerHTML = '';
        for (let b in data) body.innerHTML += `<div class="prod-btn-quick" onclick="addQuickProduct('${data[b].name}', ${data[b].price})"><b>${data[b].name}</b><br><span>${data[b].price.toFixed(2)} ₪</span></div>`;
    }
    function filterQuickProducts() {
        const term = document.getElementById('quickSearchInput').value.toLowerCase();
        const f = {}; for (let b in inventory) if (inventory[b].name.toLowerCase().includes(term)) f[b] = inventory[b];
        renderQuickProducts(f);
    }
    function addQuickProduct(n, p) { addToCart(n, p); closeProductsModal(); }

    function saveProduct() {
        const b = document.getElementById('regBarcode').value, n = document.getElementById('regName').value, p = document.getElementById('regPrice').value;
        if(b && n && p) db.ref('inventory/' + b).set({name: n, price: parseFloat(p)});
    }
    db.ref('inventory').on('value', snap => {
        inventory = snap.val() || {};
        const list = document.getElementById('inventoryList'); list.innerHTML = '';
        for (let b in inventory) list.innerHTML += `<div class="list-item" style="font-size:14px;"><span>${inventory[b].name} (${inventory[b].price.toFixed(2)}₪)</span><button onclick="db.ref('inventory/${b}').remove()" style="color:red; border:none; background:none;">מחק</button></div>`;
    });

    function addNum(n) { document.getElementById('manualPrice').value += n; }
    function clearNum() { document.getElementById('manualPrice').value = ''; }
    function addManualPrice() {
        const v = document.getElementById('manualPrice').value; if(!v) return;
        if(v.includes(' X ')) { const p = v.split(' X '); addToCart("כללי", parseFloat(p[0]) * parseFloat(p[1])); }
        else addToCart("כללי", parseFloat(v));
        clearNum();
    }
    function clearCart() { cart = []; updateUI(); }
</script>
</body>
</html>
